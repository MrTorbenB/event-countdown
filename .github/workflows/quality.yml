name: Plugin quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Lint PHP files
        run: find . -type f -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Verify distribution metadata
        run: test -f readme.txt && test -f LICENSE
